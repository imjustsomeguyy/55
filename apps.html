<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps · Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-head">
  <div class="head-inner">
    <div class="brand">Sneaky Jay's Hub <span class="mark">55</span></div>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <button id="guidesBtn" type="button">Guides</button>
      <a href="apps.html" class="active">Apps</a>
    </nav>
  </div>
</header>

<main>
  <span class="eyebrow">Apps &amp; Tools</span>
  <h1 class="page-title">What's here</h1>
  <p class="lede">Generators and tools, all in one place.</p>

  <div class="grid">

    <!-- App card: Educational Material -->
    <div class="card">
      <button class="card-link" onclick="openApp('https://educational-material.pages.dev', 'Educational Material')">
        <span class="tag">Tool</span>
        <h3>Educational Material</h3>
        <p>Open the app inline — no new tab.</p>
      </button>
    </div>

    <!--
    TEMPLATE — copy this block to add a new card.
    For an external site, use openApp('https://yoursite.com', 'App Name').
    For a local HTML file, use a regular <a href="yourfile.html">.

    <div class="card">
      <button class="card-link" onclick="openApp('https://example.com', 'App Name')">
        <span class="tag">Category</span>
        <h3>App Name</h3>
        <p>One line about what it does.</p>
      </button>
    </div>
    -->

    <div class="card add-new">+ copy the template to add a card</div>
  </div>
</main>

<footer class="site-foot">simple, sleek, just html</footer>

<!-- Guides modal -->
<div class="modal-overlay" id="guidesModal">
  <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Guides">
    <div class="modal-header">
      <span>Guides</span>
      <button class="modal-close" id="guidesClose" aria-label="Close">&times;</button>
    </div>
    <div class="modal-list">
      <a href="method-1.html"><span class="num">1</span> Method 1</a>
      <a href="method-2.html"><span class="num">2</span> Method 2</a>
      <a href="method-3.html"><span class="num">3</span> Method 3</a>
    </div>
  </div>
</div>

<!-- App iframe viewer -->
<div id="app-viewer" role="dialog" aria-modal="true" aria-label="App viewer">
  <div class="app-bar">
    <button class="app-bar-back" onclick="closeApp()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 12L4 7l5-5"/>
      </svg>
      Back
    </button>
    <span class="app-bar-title" id="app-title"></span>
    <span class="app-bar-url" id="app-url"></span>
  </div>
  <iframe id="app-frame" src="" title="App viewer" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
</div>

<script src="guides-modal.js"></script>
<script>
  function openApp(url, title) {
    const viewer = document.getElementById('app-viewer');
    document.getElementById('app-frame').src = url;
    document.getElementById('app-title').textContent = title;
    document.getElementById('app-url').textContent = url;
    viewer.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeApp() {
    const viewer = document.getElementById('app-viewer');
    viewer.classList.remove('open');
    document.getElementById('app-frame').src = '';
    document.body.style.overflow = '';
  }

  // Close on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeApp();
  });
</script>
</body>
</html>
